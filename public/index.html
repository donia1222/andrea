<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coste de Menús</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>🍽️ Coste de Menús</h1>
    <button id="btn-nuevo" class="btn btn-primary">+ Nuevo plato</button>
  </header>

  <main class="layout">
    <!-- Lista / historial de platos guardados -->
    <aside class="panel historial" id="historial">
      <input id="buscar" class="input" type="search" placeholder="Buscar plato…" />
      <ul id="lista-platos" class="lista-platos"></ul>
    </aside>

    <!-- Editor del plato -->
    <section class="panel editor" id="editor" hidden>
      <div class="campo">
        <label for="nombre-plato">Nombre del plato</label>
        <input id="nombre-plato" class="input" type="text"
               placeholder="Ej.: Quesadilla de pollo con arroz" />
      </div>

      <div class="campo">
        <label>Foto del plato</label>
        <div id="foto-caja" class="foto-caja" title="Pulsa para añadir una foto">
          <img id="foto-preview" class="foto-preview" alt="" hidden />
          <div id="foto-placeholder" class="foto-placeholder">
            <span>Añadir foto</span>
          </div>
          <button id="btn-quitar-foto" class="foto-quitar" type="button" title="Quitar foto" hidden>✕</button>
        </div>
        <input id="foto-input" type="file" accept="image/*" hidden />
      </div>

      <div class="ingredientes-cabecera">
        <h2>Ingredientes</h2>
        <button id="btn-add-ing" class="btn">+ Añadir ingrediente</button>
      </div>

      <div class="tabla-wrap">
        <table class="tabla-ing">
          <thead>
            <tr>
              <th>Ingrediente</th>
              <th>Precio compra</th>
              <th>por</th>
              <th>Cantidad usada</th>
              <th>unidad</th>
              <th class="num">Coste</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="cuerpo-ing"></tbody>
        </table>
      </div>

      <div class="total">
        <span>Coste total del plato</span>
        <strong id="coste-total">0.00 CHF</strong>
      </div>

      <div class="acciones">
        <button id="btn-guardar" class="btn btn-primary">Guardar plato</button>
        <button id="btn-cancelar" class="btn">No guardar</button>
        <button id="btn-eliminar" class="btn btn-peligro" hidden>Eliminar</button>
        <span id="aviso-guardado" class="aviso"></span>
      </div>
    </section>

    <section class="panel bienvenida" id="bienvenida">
      <p id="bienvenida-texto">Selecciona un plato de la lista o crea uno nuevo para empezar a calcular su coste.</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
